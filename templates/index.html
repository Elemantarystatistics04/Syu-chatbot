<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYU AI — LLaMA 3 Cloud Chatbot</title>
  <meta name="description" content="SYU is an advanced Generative AI chatbot powered by LLaMA 3." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050a14;
      --card: rgba(10, 20, 40, 0.75);
      --border: rgba(0, 200, 255, 0.15);
      --border-glow: rgba(0, 200, 255, 0.5);
      --cyan: #00c8ff;
      --cyan-dim: rgba(0, 200, 255, 0.12);
      --purple: #7c3aed;
      --green: #10b981;
      --text: #e2f0ff;
      --text-sec: rgba(180, 210, 255, 0.65);
      --text-muted: rgba(120, 160, 210, 0.45);
      --radius: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Animated BG */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(90px); opacity: 0.14;
      pointer-events: none; z-index: 0;
      animation: float 14s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--cyan); top: -180px; left: -100px; }
    .orb-2 { width: 400px; height: 400px; background: var(--purple); bottom: -100px; right: -80px; animation-duration: 18s; }
    @keyframes float { from { transform: translate(0,0); } to { transform: translate(40px, 60px); } }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,200,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Chat Window */
    .chat-window {
      position: relative; z-index: 10;
      width: 100%; max-width: 800px;
      height: 90vh; max-height: 780px;
      display: flex; flex-direction: column;
      background: var(--card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 0 60px rgba(0,200,255,0.1), 0 32px 80px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      display: flex; align-items: center; gap: 14px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(5, 15, 30, 0.6);
      flex-shrink: 0;
    }
    .header-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--cyan-dim); border: 2px solid var(--cyan);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; color: var(--cyan);
      box-shadow: 0 0 16px rgba(0,200,255,0.3);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 10px rgba(0,200,255,0.3); }
      50% { box-shadow: 0 0 24px rgba(0,200,255,0.6); }
    }
    .header-info h1 { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .header-info p { font-size: 0.75rem; color: var(--text-sec); }
    .header-badge {
      margin-left: auto;
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem; color: var(--cyan);
      background: var(--cyan-dim); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 20px;
    }
    .status-row { display: flex; align-items: center; gap: 6px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--purple); box-shadow: 0 0 7px var(--purple);
      animation: blink 2s ease infinite;
    }
    @keyframes blink { 0%, 100% { opacity:1; } 50% { opacity:0.3; } }

    /* Messages */
    .messages {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border-glow); border-radius: 4px; }

    /* Welcome */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1; text-align: center; padding: 20px;
      animation: fade-in 0.5s ease;
    }
    @keyframes fade-in { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
    .welcome-icon { font-size: 4rem; color: var(--purple); margin-bottom: 16px; animation: pulse 3s ease infinite; }
    .welcome h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    .welcome p { color: var(--text-sec); font-size: 0.88rem; line-height: 1.6; max-width: 420px; margin-bottom: 24px; }
    .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 500px;}
    .quick-btn {
      padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px;
      background: var(--cyan-dim); color: var(--text);
      font-family: 'Outfit', sans-serif; font-size: 0.8rem; cursor: pointer;
      transition: all 0.2s;
    }
    .quick-btn:hover { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,200,255,0.3); transform: translateY(-2px); }

    /* Message bubbles */
    .message { display: flex; gap: 10px; max-width: 85%; animation: fade-in 0.3s ease; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot  { align-self: flex-start; }

    .msg-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
    }
    .message.bot  .msg-avatar { background: var(--cyan-dim); border: 1px solid var(--cyan); color: var(--cyan); }
    .message.user .msg-avatar { background: rgba(124,58,237,0.15); border: 1px solid var(--purple); color: #c4b5fd; }

    .msg-bubble {
      padding: 12px 16px; border-radius: 16px;
      font-size: 0.95rem; line-height: 1.65;
    }
    .message.bot  .msg-bubble {
      background: rgba(10,25,50,0.8); border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      /* Format markdown-like text */
      white-space: pre-wrap;
    }
    .message.user .msg-bubble {
      background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(0,200,255,0.15));
      border: 1px solid rgba(124,58,237,0.3);
      border-bottom-right-radius: 4px;
    }

    /* Typing indicator */
    .typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--purple); animation: bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0.7); opacity:0.5; } 40% { transform: scale(1); opacity:1; } }

    /* Input Area */
    .input-area {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      background: rgba(5,15,30,0.6);
      flex-shrink: 0;
    }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    .input-row textarea {
      flex: 1; min-height: 44px; max-height: 120px; resize: none;
      background: rgba(10,20,40,0.8); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); font-family: 'Outfit', sans-serif;
      font-size: 0.95rem; padding: 12px 16px; outline: none; transition: border-color 0.2s;
    }
    .input-row textarea:focus { border-color: var(--cyan); box-shadow: 0 0 12px rgba(0,200,255,0.2); }
    .input-row textarea::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 46px; height: 46px; border-radius: 50%; border: none; flex-shrink: 0;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: #fff; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; box-shadow: 0 0 16px rgba(0,200,255,0.3);
    }
    .send-btn:hover { transform: scale(1.1); box-shadow: 0 0 28px rgba(0,200,255,0.5); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .footer-note {
      margin-top: 8px; font-size: 0.7rem; color: var(--text-muted); text-align: center;
    }
    .footer-note span { color: var(--purple); font-weight: bold; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="chat-window">
    <!-- Header -->
    <div class="chat-header">
      <div class="header-info">
        <h1>SYU AI</h1>
        <div class="status-row">
          <div class="dot"></div>
          <p>Generative AI Active &mdash; Local LLM</p>
        </div>
      </div>
      <div class="header-badge">LLaMA 3 + Groq API</div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <h2>Hello! I'm SYU AI</h2>
        <p>I've been upgraded to a true Generative AI powered by Meta's LLaMA 3. 
           I now have conversational memory and can write essays, code, and chat about anything!</p>
        <div class="quick-btns">
          <button class="quick-btn" data-msg="Write a short sci-fi story about a robot learning to paint.">&#x1F4DA; Write a story</button>
          <button class="quick-btn" data-msg="Explain quantum computing like I'm 5 years old.">&#x1F9E0; Explain Quantum</button>
          <button class="quick-btn" data-msg="Write a Python script to scrape a website.">&#x1F4BB; Code Python</button>
          <button class="quick-btn" data-msg="I have chicken, rice, and soy sauce. What can I cook?">&#x1F373; Dinner Idea</button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-row">
        <textarea id="user-input" placeholder="Type a message to LLaMA 3..." rows="1"></textarea>
        <button class="send-btn" id="send-btn" title="Send">&#x279E;</button>
      </div>
      <p class="footer-note">Powered by <span>LLaMA 3 (Cloud)</span></p>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('user-input');
    const sendBtn    = document.getElementById('send-btn');
    
    // Memory! We store the conversational history here.
    let chatHistory = [];

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeWelcome() {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();
    }

    function addMessageUI(role, text) {
      removeWelcome();
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = role === 'bot' ? '🤖' : '👤';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;
      div.appendChild(avatar);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      scrollToBottom();
    }

    function addTyping() {
      removeWelcome();
      const div = document.createElement('div');
      div.className = 'message bot';
      div.id = 'typing';
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = '🤖';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      const ind = document.createElement('div');
      ind.className = 'typing';
      for (let i = 0; i < 3; i++) {
        const dot = document.createElement('div');
        dot.className = 'typing-dot';
        ind.appendChild(dot);
      }
      bubble.appendChild(ind);
      div.appendChild(avatar);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      scrollToBottom();
    }

    async function sendMessage(text) {
      if (!text.trim()) return;
      
      // 1. Add to UI and Memory
      inputEl.value = '';
      inputEl.style.height = 'auto';
      addMessageUI('user', text);
      chatHistory.push({ role: 'user', content: text });
      
      sendBtn.disabled = true;
      addTyping();

      // 2. Send the ENTIRE history to the backend
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: chatHistory }),
        });
        
        document.getElementById('typing')?.remove();
        
        // Setup streaming reader
        const reader = res.body.getReader();
        const decoder = new TextDecoder("utf-8");
        
        // Create bot message container
        const div = document.createElement('div');
        div.className = 'message bot';
        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = '🤖';
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        div.appendChild(avatar);
        div.appendChild(bubble);
        messagesEl.appendChild(div);
        
        let fullReply = "";
        
        // Read the stream chunk by chunk
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          const chunkStr = decoder.decode(value, {stream: true});
          const lines = chunkStr.split('\n');
          for (let line of lines) {
            if (line.startsWith('data: ')) {
               try {
                 const data = JSON.parse(line.substring(6));
                 if (data.chunk) {
                   fullReply += data.chunk;
                   bubble.textContent = fullReply;
                   scrollToBottom();
                 }
               } catch (e) {}
            }
          }
        }
        
        // 3. Save the bot's reply into history so it remembers for next time
        chatHistory.push({ role: 'assistant', content: fullReply });
        
      } catch (err) {
        document.getElementById('typing')?.remove();
        addMessageUI('bot', '⚠️ Connection error. Make sure app.py is running!');
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', () => sendMessage(inputEl.value));
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(inputEl.value); }
    });
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    document.querySelectorAll('.quick-btn').forEach(btn => {
      btn.addEventListener('click', () => sendMessage(btn.dataset.msg));
    });
  </script>
</body>
</html>
